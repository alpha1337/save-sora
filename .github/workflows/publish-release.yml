name: Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_VERSION="$(jq -r '.version' manifest.json)"
          PACKAGE_VERSION="$(jq -r '.version' package.json)"

          if [[ -z "$MANIFEST_VERSION" || "$MANIFEST_VERSION" == "null" ]]; then
            echo "manifest.json is missing a valid version." >&2
            exit 1
          fi

          if [[ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "manifest.json ($MANIFEST_VERSION) and package.json ($PACKAGE_VERSION) must stay aligned." >&2
            exit 1
          fi

          RAW_SUBJECT="$(git log --format=%s -n 1 "$GITHUB_SHA")"
          SUMMARY="$(node scripts/release-summary.mjs notes "$RAW_SUBJECT")"

          echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=save-sora-v$MANIFEST_VERSION.zip" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release assets
        run: npm run build:dist

      - name: Publish or repair GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_ZIP_NAME: ${{ steps.version.outputs.zip_name }}
          RELEASE_NOTES: ${{ steps.version.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail

          ZIP_PATH="dist/$RELEASE_ZIP_NAME"
          MANIFEST_PATH="dist/save-sora-update-manifest.json"

          if [[ ! -f "$ZIP_PATH" ]]; then
            echo "Missing release zip: $ZIP_PATH" >&2
            exit 1
          fi

          if [[ ! -f "$MANIFEST_PATH" ]]; then
            echo "Missing update manifest: $MANIFEST_PATH" >&2
            exit 1
          fi

          EXISTING_RELEASE_JSON="$(gh release view "$RELEASE_TAG" --json tagName,assets,url 2>/dev/null || true)"

          if [[ -n "$EXISTING_RELEASE_JSON" ]]; then
            HAS_ZIP="$(jq -r --arg name "$RELEASE_ZIP_NAME" '[.assets[]? | select(.name == $name)] | length > 0' <<<"$EXISTING_RELEASE_JSON")"
            HAS_MANIFEST="$(jq -r --arg name "save-sora-update-manifest.json" '[.assets[]? | select(.name == $name)] | length > 0' <<<"$EXISTING_RELEASE_JSON")"

            gh release edit "$RELEASE_TAG" --notes "$RELEASE_NOTES" --latest

            if [[ "$HAS_ZIP" == "true" && "$HAS_MANIFEST" == "true" ]]; then
              echo "Release $RELEASE_TAG already exists with the required assets. Skipping publish."
              exit 0
            fi

            echo "Release $RELEASE_TAG exists but is missing one or more assets. Uploading the generated package."
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" "$MANIFEST_PATH" --clobber
            exit 0
          fi

          gh release create "$RELEASE_TAG" "$ZIP_PATH" "$MANIFEST_PATH" \
            --title "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --notes "$RELEASE_NOTES" \
            --latest
